name: Release Runner

on:
  push:
    tags: ['runner-v*']

permissions:
  contents: read
  packages: write  # ghcr.io push

jobs:
  # ─── PyPI publish ─────────────────────────────────────────────────────────
  pypi:
    name: "runner — PyPI publish"
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/theridion/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install runner deps
        working-directory: apps/runner
        run: uv sync --frozen

      - name: Run pytest before publishing
        working-directory: apps/runner
        run: uv run pytest -q --tb=short

      - name: Build distribution packages
        working-directory: apps/runner
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1
        with:
          packages-dir: apps/runner/dist/
          # PYPI_TOKEN must be added as a repository secret by Tomáš.
          # Without it, this step is skipped with a warning.
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true
          verbose: true
        continue-on-error: ${{ secrets.PYPI_TOKEN == '' }}

      - name: Warn if PyPI secret missing
        if: ${{ secrets.PYPI_TOKEN == '' }}
        run: |
          echo "::warning::PYPI_TOKEN secret is not set. PyPI publish was skipped."
          echo "::warning::Go to Settings → Secrets → Actions and add PYPI_TOKEN."

      # ── SBOM: runner ──────────────────────────────────────────────────────
      - name: Generate Python SBOM (runner)
        working-directory: apps/runner
        run: |
          uv run pip install cyclonedx-bom --quiet
          uv run cyclonedx-py environment \
            --output-format JSON \
            --outfile sbom-runner.json
        continue-on-error: true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-runner-${{ github.ref_name }}
          path: apps/runner/sbom-runner.json
          if-no-files-found: ignore
          retention-days: 90

  # ─── Docker image → ghcr.io ───────────────────────────────────────────────
  docker:
    name: "runner — Docker build + push (ghcr.io)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          # runner-v1.2.3 → 1.2.3
          VERSION="${GITHUB_REF_NAME#runner-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building Runner Docker image version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/qa-wave/theridion-runner
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest
            type=semver,pattern={{major}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}

      - name: Build and push Runner Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/runner
          file: apps/runner/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

      - name: Smoke-test pushed image
        run: |
          docker run --rm \
            ghcr.io/qa-wave/theridion-runner:${{ steps.version.outputs.version }} \
            theridion --version
        continue-on-error: true
