# ─── CI: Lint → Typecheck → Test (skip-if-absent) → Build ────────────────────
# Resilientní: chybějící test/e2e NEzpůsobí fail. Tvrdý signál = build.
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  quality:
    name: "Lint · Typecheck · Test · Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Install
        run: npm ci || npm install
      - name: Lint (skip if absent)
        run: npm run lint --if-present
      - name: Typecheck (skip if absent)
        run: npm run typecheck --if-present
      - name: Unit tests (skip if no test script)
        run: |
          if node -e "process.exit(require('./package.json').scripts?.test?0:1)"; then
            npm test
          else
            echo "::notice::Zadny test script - preskakuji unit testy."
          fi
      - name: E2E tests (skip if no Playwright tests)
        run: |
          if [ -f playwright.config.ts ] || [ -f playwright.config.js ]; then
            if npx playwright test --list >/dev/null 2>&1; then
              npx playwright install --with-deps chromium
              npx playwright test
            else
              echo "::notice::Playwright config bez testu - preskakuji E2E."
            fi
          else
            echo "::notice::Zadny Playwright config - preskakuji E2E."
          fi
      - name: Build (hard signal)
        run: npm run build
