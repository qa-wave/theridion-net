name: integration

on:
  push:
    branches: [main]
    paths:
      - "tests/**"
      - "apps/sidecar/**"
      - ".github/workflows/integration.yml"
  pull_request:
    paths:
      - "tests/**"
      - "apps/sidecar/**"
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Clone mocks repo
        run: |
          # Mocks are normally at /Users/tm/tools/mocks/ on dev workstation.
          # In CI we expect them to be checked out alongside this repo via a
          # separate step (TODO: extract /Users/tm/tools/mocks/ into its own
          # repo and check it out here). For now, fail fast with a clear hint.
          if [ ! -d "/Users/tm/tools/mocks" ] && [ ! -d "$GITHUB_WORKSPACE/../mocks" ]; then
            echo "::error::Mock servers not found. See tests/README.md for setup."
            exit 1
          fi

      - name: Sync sidecar deps
        working-directory: apps/sidecar
        run: uv sync

      - name: Sync tests deps
        working-directory: tests
        run: uv sync

      - name: Run integration tests
        working-directory: tests
        run: uv run pytest -v --tb=short
        env:
          PYTHONUNBUFFERED: "1"

      - name: Upload mock logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mock-logs
          path: /Users/tm/tools/mocks/logs/
          if-no-files-found: ignore
